body:
  text: 上清後聖道君列紀上清髙上玉眞衆道綜監寳諱上清後聖道君列紀方諸東宫青童君傳弟子王逺逰上清金闕後聖帝君李諸弘元一諱玄水字子光一字山淵蓋地皇之冑玄帝時人上和七年歲在丙子三月直合日始育於北國天剛山下李氏之家母先夢玄雲日月纏其形乃感而懷焉浴之亦有羣龍吐水於盥器中年五歲仍好道樂眞言頌成章常仰日欣笑對月吟歎觀陽氣之煥赫覩隂道以虧殘於是斂魂研魄守胎寳神録精鎭血固液凝筋乃學於吞光飲霞咀嚼飛根行年二十而有金姿玉顔遂棄家離親超迹風塵潜室長齋浮遊名山獨秉靈臺之符玄照委順之化悟三炁而含變冥神樞以齊眞抗其志也虚上執其誠也極微蕭朗靈致幽㫖宏謐逸理竒落淵偉沖寂棲心於霄景之外拘魂歸乎絳庭之中制魄使青玄俱守育氣在於丹素之房爾乃神不啓虧靈不飈散内德圓充外累逺判屏仙羅於地陸尋上眞于紫館於是精感太虚心通神旦遂致天帝下教流光拔粲授以鬱儀大章大洞眞經給以曲晨飛蓋飲以徊水玉精貽以素羽玄翮以昇八方於兹受命退齋施行誦經凡二十四事勤慕上㑹不倦情思忽時有躭咀幽微便凝遷忘還推機得宗然後權焉獨任研經詠玄朗豁外物棲神九遐有息忘之觀也及君髙韻啓期細累臺廢俯和衆朋亹草神迹斷滯渙疑玄理廣絶連黨日汲其清波而不測天淵之源始矣洞暢虚中靈元内鑒爰有紫微上眞天帝玉清君遣八景瓊輿來迎聖君以登上清宫賜蘂剛丹玉鳳璽金眞玉光給神虎之符及飛行之羽朱錦龍裙青帔虎帶要光霞日子戴圓容神冠受書爲上清金闕後聖帝君上昇上清中遊太極官下治十天封掌兆民及諸天河海神仙地源隂察鬱絶洞臺内根理玄布氣敷雲蕩津翔盻小有解駕龜山窮幽照伏毫未皆關也將欲見聖君之遊行也瓊輪琅輿碧輦玄龍三素流霞月精吐芳飛音繞日流電揚鋒奔蛇擊劒長牙激鐘華光交煥三燭合明前嘯則九鳯齊唱後吹則八鸞同聲神虎仰號飛龍俯鳴天鈞奏其旍蓋百音發其虚庭靈妃羣讃仙賔啓路神女揮紫烟以亂氣玉童運日華以却暮長歌雲陣無晝無夜當爾時也天光冥邈流映八外誠太極之壯觀上清之髙帝也所以髙號於上清者神髙靈虚故也所以中遊於太極者緫羣眞朝飛仙故也所以下治於十天者封掌於兆民故也隂察於洞天者是無下而不關故也夫唯二氣離合理物有期三道虧盈出處因運期之至也因而適之運有來矣就而撫之唐承之年積數有四十六丁亥之間前後在中中間鳥獸之世國祚啓竭東西稱覇以扶弱主主有縱横九一之名逮號光迹昌元其後甲申之歲已前已後種善人除殘民疫水交其上兵火繞其下惡惡並滅凶凶皆没好道陸隱善人登山流濁奔蕩御之鯨淵都分别也到壬辰之年三月六日聖君來下光臨扵兆民矣當是時也聖君發自青城西山出隴南雲北察龍燭之外西旋九流之關東之扶林晨落南視朱山雲中乘三素飛輿從虚輦萬龍天光緫照神鑒三辰於爲滅惡人已於水火存慈善已爲種民學始者爲仙使得道者爲仙官若能精洞房於上元修九眞以彌勤歩隱書於七靈窮八素之用誠既得渉乎三灾而不傷又必觀更始於太平又得賜書仙官神眞長生也但此玄文靈術藏於上清之宫金闕之中少有見篇目者耳神眞下教七百年内三出傳授授傳獲之不必賢愚精心修行皆得飛仙然率有玄録仙骨玉名方諸乃得之也自非此相終不與此文相遇縱有百萬之中誤或見者蓋應運傳驛付授有在由歴交關冝爲靈使故令彼甲得而有所付耳徒有而不行冥教如此矣學仙者冝廣行名山跪祝天靈尋此冥訣庶得寳祕以階神仙之官乎然後聖君當復料其麤妙擢以補官僚者或位爲仙伯或拜爲諸侯助聖教民理氣布德或封掌一邑委政一國若奉鬱儀以召日施結璘以攝月詠大洞之上經七變之轉書桉金闕之眞書得佩神虎之大符施八道以拘神啓紫文以驚浮誦金根以長存設九赤以封丘命曲素以招鬼役紫度以照元飲五行以呼魂挹琅玕而不休經嶮試而無疑履兵火而莫憂者皆位爲左右仙公及左右大夫或爲卿相之司上國仙侯也所以聖君從虎輦萬龍者以視衆仙隨才而授給也聖君雖封掌兆民下眄萬生故自逍遥金闕宫館上清棲形太虚遨遊五城察照十天百方太平也諸見太平者或是慈心仁人守善而已或是學道信仙可教之士或靈人授書守精寳胎或得道得仙精誠之夫或玄簡録名七世有德祚及子孫當爲仙者或生而青骨通神接眞或有才性偉寂天分淑邁作仙之品第髙下數百矣聖君乃隨才署置以爲大小諸侯各皆有秩以君種民也諸侯一年一朝上清見聖君以受事也聖君五年一下逰以幸諸侯察種民而聽仙理焉蓋聖君之學道也備甞艱苦承師塗炭履飢寒之切已蹈水火之轗軻寫私念於五親累經天帝之大試皆心堅正任死生必期萬邪不能犯其神千妖不能惑其眞爾乃精誠玄暢靈神合應故上皇告訣天尊授道矣可謂洞朗悠韻玄扉開散髙範絶妙精覽獨立幽關萬塗天理旁出非復簡札翰墨所能縷載粗書千分之一略舉標迹以傳骨相當仙之子有得見者玄録書名奏之上清位爲仙卿若能行金闕眞事拜爲大夫侍書有玉童十人侍金闕紫文有玉女十人每當看詠施行皆冝拜而恭之盛手燒香於文之左右輕慢靈紀身爲下鬼三祖獲考玉童玉女上言其違奏聞其誠心惡善纎芥無不書焉方諸東宫青童君啓撰後聖道君列紀以上呈聖君傳青童弟子王逺遊使下示骨相應仙之人百年再傳七百年内聽三傳以授學道當來成仙者也聖君曰有得吾列紀皆玄名仙才録文定書或上金格玉書當仙之人者也若既得此紀唯奉寳祕無他修爲皆賜白日尸解若既得而後不奉道德寫眞淪俗性反志替有如此徒是遊逸下才非芳骨之人矣猶以得吾列紀之故猶必賜名地下主者以消其濁質蕩箕穢魄也從此當漸令有階級之進悟於大迷之夢耳諸子勤而愼焉勿以泄告不信之尸佩吾列紀以入灾疫水火兵革之中山林衆精千邪萬禍皆莫當子其人見汝皆令有歡心也書有玉童奉侍以覆及子身故也惡人惡心妄去加子者吾自當使山川之靈伐其命矣勿謂道遼靈鑒安是吾從太虚之上玄空之中相視猶目瞻鼻耳子故不信幸可一試而犯我之禁誓乎看我能探得不言之心内應之禍福哉受書皆使有誓盟爲不泄之信今遣下教扵骨命及精心學仙守誠者遣馬明張陵隂生王褒墨翟司馬季主及洞臺清虚天七眞人八老先生凡二十四人或名隱名見改易姓字實難分别也子但當心精誠夙夜不懈必自得見此諸人既見之後眞姓實名亦將告子也後聖君命王君緫司二十四眞人決下教之功二十四眞人皆受事於方諸青童受所教之徒於王君王君亦先告可成者於二十四眞人眞人然後受事乃教之也聖君列紀唯以付王君一人使擇可授者不盡使諸眞人並傳之也欲知二十四眞人姓名在吾青要衆文經未是其定人所教書符神訣篇目並列之于經上鬱儀結璘大洞玄經上清金闕靈書紫文八素眞經太上隱書九眞中經黄老八道祕言太丹十訣玉字洞房此經所授皆位爲左右仙公及大夫左右卿相上司也其餘九丹變化太清上經黄素道精青録天關此經所授皆位爲眞人及領眞宫上監封仙國侯伯也各有次第品差在方諸宫白簡青録具載其序後聖彭君諱廣淵一名玄虚字大椿一字正陽彭亦爲李或名彭先李君學道人皇時生位爲太微左眞保皇君並當受命封校兆民爲李君太師治在太微北墉宫靈上光臺彭君二千五百年輙易名字展轉太虚周遊八冥上至無上下至無下眞官希有得見其光顔者矣然起學所履姓字眞定具列方諸宫白簡青録之篇後聖李君上相方諸宫青童君後聖李君上保太丹宫南極元君後聖李君上傅白山宫太素眞君後聖李君上宰西城宫緫眞王君右四輔大相其餘卿司仙公及大夫官三百六十人並列白簡青録之篇不復一二紀其姓字矣青童君曰夫有骨録則好仙好仙之人皆有仙志仙志之人或罷或篤罷則先世善功不足篤則玄録宿命將定或好仙而不專亦由世德有未備者也大都天録顯於玄宫則氣候診於軀形録字彰於太極則心神正於丹房若生有金閣玉名者則眼有日光青齒白血其爲人也則仁慈而樂仙明頴而秀挺若上清有金書玉録者則背誌於河魁胷前有偃骨其爲人也恭和而下人德及昆蟲若太極宫有丹簡青文者則手理有累人倒大之字其爲人也宻愼而好眞清虚而容非若方諸有玄素紫名者則眼四䂓中有紫光照鑒其軀其爲人也修業深妙清盛避穢若太清有玉籍絳名者則聲有玉音金響口方目圓其爲人也弘施博愛視人如傷若太素有瓊簡金名者則白誌見於腹口中有紫氣其爲人也慈德而通神潜仁而下衆若南極有丹文紫録者則頭生五氣上接重樓之雲其爲人也和仁而愛窮賑厄而濟難若斗中有玄玉緑籍也則心中有九孔肺外有錦文頥下有玉九目中有緑筋眉角當有上千雙理順文城郭秃鬢露顙明堂平白千理爲通眞之津廣顙爲受靈之宅其爲人也慈愛窮賤仁及鳥獸若玄宫上元有青金赤書者則丹心紫孔黄華繞胃口中香氣齒多玉液其爲人也少好視日月之流霞樂星辰之光象質清骨堅精誠深祕若玄都丹臺有白玉金字者則青肝紫絡倉腎綾文玄膺精溢形盛神潔身體香軟血清氣澤其爲人也躭存玄逺味景靈質好惠下已救施厄匱若三元宫有琳札青書者則紫腦錦舌玄誌鬢際緑腸朱髓方天圓額隂有伏骨軟髪紫澤孔門三開起居似澁眼有流光青精凝液掌文四逹齒牙三鍔其爲人也靈心仁虚慈感發神好微敬信樂林興春愛水清流懷感山川願投名阿保魄養魂志凌青泰逺味天仙諸有如此相皆必上仙也亦可學而得亦可不學而獲要其人必好道好道學微必速得昇變矣其次鼻上有玄山玄山鼻上有黒誌是也又當使腹有玄丘以對玄山也玄丘者亦黒誌也若闕其一皆不合仙相若口臭而性耐穢者都壞玄山玄丘之相矣其次青骨青骨者其人皆樂聞五香之氣好學神靈之事其次鵠行龍趨項生玉枕耳後伏晨脅下有青誌體生絡文及心眞膽靜耳堅氣寛此皆次仙之相也玄洲亦有黄金刻名之籍不學而得尸解主者若學得白日放尸之仙也其次太山三官府有生之郷脫無死之地其人魂命不終於死浮游無限故以學仙道者有成陸行之仙耳當三十年一易地而處轉名而止亦無死期所以爾者太山三官玄録白籍不注有死之地故也非三官之妄注於死地太隂注死生有黒録白簿赤丹編簡受生先後相次受死亦先後相比其數得六千簡輙注一人無死地其人率多長壽而難死年多出一百歲既死忽然而無痛病矣若加之以學仙幾當成而可教者也然此人性多恊畏而和柔多好事於微妙皆仙相也其次篤志至道精意堅正或廣行隂德濟貧拯困施惠親窮藏埋枯骨德過古人貞平允淑温恭厚下不淫不賊或先人施恩世世立功德在三官已立三百善事以此學道皆可得仙也其心正則天地弗能違也其神堅則鬼神弗能逆也其魂明則衆邪弗能侵也其魄白則萬妖弗能干也其精清則淫尸弗能乗也其液盛則三蟲弗能亂也其血凝則濁氣弗能散也故夫學道者眞心堅神厲魄抱魂拘千邪於八荒之獄閉萬妖於九遐之端精誠以存眞一於太初孜孜常願凌翮以飛仙朱靈安於絳宅五寳守乎清玄履試觀而不傾居榮辱而不遷委南面而弗顧棄萬金而莫恨甘寒苦之轗軻樂靜齋於丘山守誠心而不勌並天地可長存如是始可與言學道之夫矣若都無此相又無此行雖復英雄㧞標志吞四海横氣宏落髙韻凌雲淵瑋洞朗飛翰辯言雅任竒邁理幽綜滯口談虚無而目營八方者固非仙才也所謂徒勞以終年無解於不得矣上清後聖道君列紀
